name: Build ScpReroll

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ScpReroll/ScpReroll.csproj

      - name: Build
        run: dotnet build ScpReroll/ScpReroll.csproj -c Release --no-restore

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: ScpReroll
          path: ScpReroll/bin/Release/net48/ScpReroll.dll
